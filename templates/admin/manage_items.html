{% extends "base.html" %}
{% block main_content %}
<h2>Admin Dashboard</h2>
<div class="admin_nav">
    <a href="{% url 'add_book' %}" class="btn_action">+ Nouveau Livre</a>
</div>
<table>
    <tr>
        <th>ISBN</th><th>Titre</th><th>Actions</th>
    </tr>
    {% for item in items_list %}
    <tr>
        <td>{{ item.isbn_id }}</td>
        <td>{{ item.title_nom }}</td>
        <td>
            <a href="{% url 'edit_book' item.isbn_id %}">Editer</a>
            <a href="{% url 'del_book' item.isbn_id %}">Supprimer</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
